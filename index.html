<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SWF Player - CoreScripts</title>
    <style>
        /* Basic styles for functionality */
        body {
            background: #333;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #container {
            max-width: 1000px;
            width: 100%;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #upload-area {
            background: #444;
            color: white;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            border: 2px dashed #888;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #upload-area:hover {
            background: #555;
        }
        #controls {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background: #555;
            color: white;
            border: 1px solid #777;
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        #player {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            border-radius: 5px;
            overflow: hidden;
        }
        #filename {
            color: #0f0;
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            word-break: break-all;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: black;
            width: 100%;
            height: auto;
        }
        #footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #444;
        }
    </style>
</head>
<body>
<div id="container">
    <div id="upload-area">
        📁 Click here to upload SWF file
    </div>
    <input type="file" id="file-input" accept=".swf" style="display:none">
    <div id="filename"></div>
    <div id="controls">
        <button id="stop-btn">⏹️ STOP</button>
        <button id="full-btn">🖥️ FULLSCREEN</button>
    </div>
    <div id="player">
        <div id="waflashContainer">
            <div style="color:#888; text-align:center;">No SWF loaded<br>Click above to upload</div>
        </div>
    </div>
    <div id="footer">-Made by CoreScripts-</div>
</div>

<script>
    // --- WAFlash Configuration ---
    // Point the engine to the folder where you host the .data and .wasm files
    window.wafOptions = {
        baseUrl: './waflash/'
    };
    var gameConfig = { swfUrl: "" };
    var currentSwfUrl = null;

    // --- DOM Elements ---
    var uploadDiv = document.getElementById('upload-area');
    var fileInput = document.getElementById('file-input');
    var filenameDiv = document.getElementById('filename');
    var stopBtn = document.getElementById('stop-btn');
    var fullBtn = document.getElementById('full-btn');
    var waflashContainer = document.getElementById('waflashContainer');

    // --- Helper Functions ---
    function createAndPlay(swfUrl) {
        // Clear the container for a new game
        while (waflashContainer.firstChild) {
            waflashContainer.removeChild(waflashContainer.firstChild);
        }
        // Create a new canvas element for WAFlash to render on
        var canvas = document.createElement('canvas');
        canvas.id = 'canvas';
        canvas.setAttribute('tabindex', '1');
        canvas.width = 800;
        canvas.height = 600;
        canvas.style.background = 'black';
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        waflashContainer.appendChild(canvas);
        gameConfig.swfUrl = swfUrl;
        // Check if the WAFlash function is ready and call it
        if (typeof createWaflash === 'function') {
            createWaflash(gameConfig.swfUrl, window.wafOptions);
        } else {
            filenameDiv.innerHTML = 'Error: WAFlash engine not loaded. Check the console for details.';
            console.error("WAFlash engine (createWaflash) is not available.");
        }
    }

    // --- Event Listeners ---
    uploadDiv.onclick = function() {
        fileInput.click();
    };

    fileInput.onchange = function(e) {
        var file = e.target.files[0];
        if (!file || !file.name.toLowerCase().endsWith('.swf')) {
            filenameDiv.innerHTML = 'Invalid .swf file';
            return;
        }
        filenameDiv.innerHTML = '🎮 Playing: ' + file.name;
        if (currentSwfUrl) URL.revokeObjectURL(currentSwfUrl);
        currentSwfUrl = URL.createObjectURL(file);
        createAndPlay(currentSwfUrl);
    };

    stopBtn.onclick = function() {
        while (waflashContainer.firstChild) {
            waflashContainer.removeChild(waflashContainer.firstChild);
        }
        var div = document.createElement('div');
        div.style.color = '#888';
        div.style.textAlign = 'center';
        div.innerHTML = '⏹️ Stopped<br>Upload a new SWF file';
        waflashContainer.appendChild(div);
        filenameDiv.innerHTML = '';
        if (currentSwfUrl) {
            URL.revokeObjectURL(currentSwfUrl);
            currentSwfUrl = null;
        }
    };

    fullBtn.onclick = function() {
        var playerDiv = document.getElementById('player');
        if (playerDiv.requestFullscreen) playerDiv.requestFullscreen();
        else if (playerDiv.webkitRequestFullscreen) playerDiv.webkitRequestFullscreen();
    };

    // Focus on the canvas to ensure keyboard input works for the game
    document.addEventListener('click', function() {
        var c = document.getElementById('canvas');
        if (c) c.focus();
    });

    console.log("Page loaded, waiting for WAFlash engine...");
</script>

<!-- Load the WAFlash engine scripts from your local 'waflash' folder -->
<script src="waflash/waflash-player.min.js"></script>
<script src="waflash/waflash.min.js"></script>
</body>
</html>
