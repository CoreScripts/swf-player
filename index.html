<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SWF Player - CoreScripts</title>
    
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        body {
            background: #333;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #container {
            max-width: 1000px;
            width: 100%;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #upload-area {
            background: #444;
            color: white;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            border: 2px dashed #888;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #upload-area:hover {
            background: #555;
        }
        #controls {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background: #555;
            color: white;
            border: 1px solid #777;
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        #player {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            border-radius: 5px;
            overflow: hidden;
        }
        #waflashContainer {
            width: 100%;
            height: 100%;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #filename {
            color: #0f0;
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 15px;
        }
        #footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #444;
        }
        ruffle-player {
            width: 100%;
            height: 500px;
            display: block;
        }
    </style>
</head>
<body>
<div id="container">
    <div id="upload-area">
        Click here to upload SWF file
    </div>
    <input type="file" id="file-input" style="display:none">
    <div id="filename"></div>
    <div id="controls">
        <button id="stop-btn">STOP</button>
        <button id="full-btn">FULLSCREEN</button>
    </div>
    <div id="player">
        <div id="waflashContainer">
            <div style="color:#888; text-align:center;">No SWF loaded<br>Click above to upload</div>
        </div>
    </div>
    <div id="footer">-Made by CoreScripts-</div>
</div>

<script>
    const ruffle = window.RufflePlayer.newest();
    let rufflePlayerInstance = null;
    let currentSwfUrl = null;

    const uploadDiv = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const filenameDiv = document.getElementById('filename');
    const stopBtn = document.getElementById('stop-btn');
    const fullBtn = document.getElementById('full-btn');
    const container = document.getElementById('waflashContainer');
    
    uploadDiv.onclick = function() {
        fileInput.click();
    };

    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (!file || !file.name.toLowerCase().endsWith('.swf')) {
            filenameDiv.innerHTML = 'Invalid .swf file';
            return;
        }
        
        filenameDiv.innerHTML = 'Playing: ' + file.name;
        
        if (currentSwfUrl) URL.revokeObjectURL(currentSwfUrl);
        currentSwfUrl = URL.createObjectURL(file);
        container.innerHTML = '';
        
        rufflePlayerInstance = ruffle.createPlayer();
        container.appendChild(rufflePlayerInstance);
        
        rufflePlayerInstance.load({
            url: currentSwfUrl,
            allowScriptAccess: true
        });
    };

    stopBtn.onclick = function() {
        container.innerHTML = '<div style="color:#888; text-align:center;">Stopped<br>Upload a new SWF file</div>';
        filenameDiv.innerHTML = '';
        if (currentSwfUrl) {
            URL.revokeObjectURL(currentSwfUrl);
            currentSwfUrl = null;
        }
        fileInput.value = ''; 
        rufflePlayerInstance = null;
    };

    fullBtn.onclick = function() {
        const playerDiv = document.getElementById('player');
        if (playerDiv.requestFullscreen) {
            playerDiv.requestFullscreen();
        } else if (playerDiv.webkitRequestFullscreen) {
            playerDiv.webkitRequestFullscreen();
        }
    };
</script>
</body>
</html>
