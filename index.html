<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWF Player</title>
<style>
body {
    background: #333;
    margin: 0;
    padding: 20px;
    font-family: monospace;
}
#container {
    max-width: 1000px;
    margin: 0 auto;
}
#upload-area {
    background: #222;
    color: white;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
    border: 2px dashed #666;
}
#controls {
    background: #222;
    padding: 10px;
    margin-bottom: 20px;
    text-align: center;
}
button {
    background: #444;
    color: white;
    border: 1px solid #666;
    padding: 8px 16px;
    margin: 0 5px;
    cursor: pointer;
    font-family: monospace;
}
button:hover {
    background: #555;
}
#player {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 500px;
}
#filename {
    color: #0f0;
    margin-top: 10px;
    text-align: center;
    font-size: 12px;
}
canvas {
    display: block;
    margin: 0 auto;
    background: black;
}
#footer {
    text-align: center;
    margin-top: 20px;
    padding: 10px;
    color: #888;
    font-size: 12px;
    border-top: 1px solid #444;
}
</style>
</head>
<body>
<div id="container">
<div id="upload-area">
Click here to upload SWF file
</div>
<input type="file" id="file-input" accept=".swf" style="display:none">
<div id="filename"></div>
<div id="controls">
<button id="play-btn">PLAY</button>
<button id="stop-btn">STOP</button>
<button id="full-btn">FULLSCREEN</button>
</div>
<div id="player">
<div id="waflashContainer">
<div style="color:#888; text-align:center;">No SWF loaded<br>Click above to upload</div>
</div>
</div>
<div id="footer">-Made by CoreScripts-</div>
</div>

<script>
window.wafOptions = { baseUrl: './waflash/' };
var gameConfig = { swfUrl: "" };
var currentSwfUrl = null;

var uploadDiv = document.getElementById('upload-area');
var fileInput = document.getElementById('file-input');
var filenameDiv = document.getElementById('filename');
var playBtn = document.getElementById('play-btn');
var stopBtn = document.getElementById('stop-btn');
var fullBtn = document.getElementById('full-btn');
var waflashContainer = document.getElementById('waflashContainer');

uploadDiv.onclick = function() {
    fileInput.click();
};

fileInput.onchange = function(e) {
    var file = e.target.files[0];
    if (!file || !file.name.endsWith('.swf')) {
        filenameDiv.innerHTML = 'Invalid .swf file';
        return;
    }
    filenameDiv.innerHTML = 'Loaded: ' + file.name;
    if (currentSwfUrl) URL.revokeObjectURL(currentSwfUrl);
    currentSwfUrl = URL.createObjectURL(file);
};

function createCanvas() {
    while (waflashContainer.firstChild) {
        waflashContainer.removeChild(waflashContainer.firstChild);
    }
    var canvas = document.createElement('canvas');
    canvas.id = 'canvas';
    canvas.setAttribute('tabindex', '1');
    canvas.width = 800;
    canvas.height = 600;
    canvas.style.background = 'black';
    waflashContainer.appendChild(canvas);
    return canvas;
}

playBtn.onclick = function() {
    if (!currentSwfUrl) {
        filenameDiv.innerHTML = 'Please select an SWF file first';
        return;
    }
    createCanvas();
    gameConfig.swfUrl = currentSwfUrl;
    if (typeof createWaflash === 'function') {
        createWaflash(gameConfig.swfUrl, window.wafOptions);
    } else {
        filenameDiv.innerHTML = 'WAFlash not loaded. Check waflash folder.';
    }
};

stopBtn.onclick = function() {
    while (waflashContainer.firstChild) {
        waflashContainer.removeChild(waflashContainer.firstChild);
    }
    var div = document.createElement('div');
    div.style.color = '#888';
    div.style.textAlign = 'center';
    div.innerHTML = 'Stopped<br>Click PLAY to restart';
    waflashContainer.appendChild(div);
};

fullBtn.onclick = function() {
    var playerDiv = document.getElementById('player');
    if (playerDiv.requestFullscreen) playerDiv.requestFullscreen();
    else if (playerDiv.webkitRequestFullscreen) playerDiv.webkitRequestFullscreen();
};

document.addEventListener('click', function() {
    var c = document.getElementById('canvas');
    if (c) c.focus();
});
</script>
<script src="waflash/waflash-player.min.js"></script>
<script src="waflash/waflash.min.js"></script>
</body>
</html>
